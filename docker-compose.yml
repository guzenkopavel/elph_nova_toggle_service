version: '3.9'

# ──────────────────────────────────────────────────────────────────
# Elph Nova Feature Config Service — production docker-compose
#
# Prerequisites:
#   Copy .env.example to .env and fill in the required values.
#   Run: docker compose up -d
# ──────────────────────────────────────────────────────────────────

services:

  # ────────────────── PostgreSQL ─────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: feature_config
      POSTGRES_USER: feature_config
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feature_config -d feature_config"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ────────────────── App ─────────────────────────────────────────
  app:
    build: .
    # Or use a pre-built image from a registry:
    # image: ghcr.io/your-org/elph-nova-feature-config:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}

      # Database — points to the db service above
      DATABASE_URL: postgres://feature_config:${POSTGRES_PASSWORD}@db:5432/feature_config

      # Manifest
      MANIFEST_PATH: /app/manifest/elph-nova-feature-manifest.json
      DEFAULT_PRODUCT_ID: ${DEFAULT_PRODUCT_ID:-elph_nova}

      # Admin auth (required in production)
      ADMIN_COOKIE_SECRET: ${ADMIN_COOKIE_SECRET:?ADMIN_COOKIE_SECRET is required}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
      ADMIN_ALLOWED_IPS: ${ADMIN_ALLOWED_IPS:-}

      # SSO / JWKS (leave empty to allow anonymous + authenticated configs without JWT verification)
      SSO_JWKS_URI: ${SSO_JWKS_URI:-}
      SSO_ISSUER: ${SSO_ISSUER:-}
      SSO_AUDIENCE: ${SSO_AUDIENCE:-}

      # CORS origins for the public API (comma-separated, or "none" to deny all)
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-none}

      # Public/admin base URLs (used for self-referential links, optional)
      FEATURE_CONFIG_PUBLIC_BASE_URL: ${FEATURE_CONFIG_PUBLIC_BASE_URL:-}
      FEATURE_CONFIG_ADMIN_BASE_URL: ${FEATURE_CONFIG_ADMIN_BASE_URL:-}

      # Rate limits
      RATE_LIMIT_PUBLIC_MAX: ${RATE_LIMIT_PUBLIC_MAX:-300}
      RATE_LIMIT_ADMIN_MAX: ${RATE_LIMIT_ADMIN_MAX:-100}
    volumes:
      # Mount the manifest directory from the host so you can update
      # the manifest file and re-run sync-manifest without rebuilding the image.
      - ./manifest:/app/manifest:ro
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
